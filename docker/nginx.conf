upstream nextjs {
    server app:3000;
}

server {
    listen 80;
    server_name leasing.evocars.ru;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name leasing.evocars.ru;

    ssl_certificate /etc/letsencrypt/live/leasing.evocars.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leasing.evocars.ru/privkey.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml model/gltf-binary;
    gzip_min_length 1000;

    location /_next/static/ {
        proxy_pass http://nextjs;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        proxy_pass http://nextjs;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /models/ {
        proxy_pass http://nextjs;
        expires 30d;
        add_header Cache-Control "public";
    }

    client_max_body_size 50m;

    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
